<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maintenance - OceanPhenix</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, rgba(10, 25, 41, 0.95), rgba(30, 58, 95, 0.95)), 
                        url('Images/ThinkinG.png') no-repeat center center;
            background-size: cover;
            background-attachment: fixed;
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .maintenance-container {
            text-align: center;
            max-width: 600px;
            background: rgba(255, 255, 255, 0.05);
            -webkit-backdrop-filter: blur(10px);
            backdrop-filter: blur(10px);
            padding: 3rem;
            border-radius: 20px;
            border: 2px solid rgba(0, 217, 255, 0.3);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        .icon {
            font-size: 5rem;
            margin-bottom: 1.5rem;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.1); opacity: 0.8; }
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 1rem;
            background: linear-gradient(135deg, #00d9ff, #5ce1e6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        p {
            font-size: 1.1rem;
            line-height: 1.6;
            color: #c5d0de;
            margin-bottom: 1rem;
        }

        .time {
            display: inline-block;
            margin-top: 1.5rem;
            padding: 0.75rem 1.5rem;
            background: rgba(0, 217, 255, 0.1);
            border: 1px solid #00d9ff;
            border-radius: 50px;
            font-size: 0.9rem;
            color: #00d9ff;
        }

        .contact {
            margin-top: 2rem;
            padding-top: 2rem;
            border-top: 1px solid rgba(0, 217, 255, 0.2);
        }

        .contact a {
            color: #00d9ff;
            text-decoration: none;
            font-weight: 500;
            transition: color 0.3s ease;
        }

        .contact a:hover {
            color: #5ce1e6;
        }

        @media (max-width: 600px) {
            h1 { font-size: 2rem; }
            .maintenance-container { padding: 2rem 1.5rem; }
        }
    </style>
</head>
<body>
    <div class="maintenance-container">
        <div class="icon">🔧</div>
        <h1>Maintenance en cours</h1>
        <p>
            Le site <strong>OceanPhenix.fr</strong> est actuellement en maintenance 
            pour améliorer votre expérience.
        </p>
        <p>
            Nous effectuons des mises à jour techniques et de sécurité.
        </p>
        <div class="time">
            ⏱️ Retour prévu sous peu
        </div>
        <div class="contact">
            <p style="font-size: 0.9rem;">
                Pour toute urgence : 
                <a href="https://www.linkedin.com/in/stephane-celton" target="_blank" rel="noopener">
                    LinkedIn - Stéphane Celton
                </a>
            </p>
        </div>
    </div>
</body>
</html>
